  width: 40%;
  margin: 0 auto;
  background: rgba(255,255,255,0.2);
  padding: 35px;
  border: 2px solid #fff;
  border-radius: 20px/50px;
  background-clip: padding-box;
  text-align: center;
}

.button-help2323 {
  font-size: 1em;
  padding: 10px;
  color: white!important;
}
.button-help2323:hover {
  background: #06D85F;
}

.overlay-help2323 {
  position: fixed;
  top: 0;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0, 0, 0, 0.7);
  transition: opacity 500ms;
  visibility: hidden;
  opacity: 0;
}
.overlay-help2323:target {
  visibility: visible;
  opacity: 1;
}

.popup-help2323 {
  margin: 70px auto;
  padding: 20px;
  background: #fff;
  border-radius: 5px;
  width: 40%;
  position: relative;
  transition: all 5s ease-in-out;
}

.popup-help2323 h2 {
  margin-top: 0;
  color: #333;
  font-family: Tahoma, Arial, sans-serif;
}
.popup--help2323 .close-help2323 {
  position: absolute;
  top: 20px;
  right: 30px;
  transition: all 200ms;
  font-size: 30px;
  font-weight: bold;
  text-decoration: none;
  color: #333;
}
.popup-help2323 .close-help2323:hover {
  color: #06D85F;
}
.popup-help2323 .content-help2323 {
  max-height: 30%;
  overflow: auto;
}
.h2-help2323 {
  color:yellow;
}

@media screen and (max-width: 700px){
  .box-help2323{
    width: 80%;
  }
  .popup-help2323{
    width: 80%;
  }
}
