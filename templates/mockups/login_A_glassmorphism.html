<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Mockup A - Glassmorphism</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #0a1628, #1a365d, #2563eb, #1e40af);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        .shape:nth-child(1) { width: 400px; height: 400px; top: -100px; left: -100px; animation-delay: 0s; }
        .shape:nth-child(2) { width: 300px; height: 300px; bottom: -50px; right: -50px; animation-delay: -5s; }
        .shape:nth-child(3) { width: 200px; height: 200px; top: 50%; left: 80%; animation-delay: -10s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .login-header {
            padding: 50px 40px 30px;
            text-align: center;
        }

        .logo-container {
            background: white;
            border-radius: 16px;
            margin: 0 auto 25px;
            padding: 15px 25px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .logo-container img {
            height: 50px;
            width: auto;
        }

        .brand-name {
            color: white;
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .brand-name span {
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .login-body {
            padding: 30px 40px 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
        }

        .form-control {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-control:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        .form-options {
            display: flex;
            align-items: center;
            margin-bottom: 28px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-wrapper input {
            width: 18px;
            height: 18px;
            accent-color: #3b82f6;
        }

        .checkbox-wrapper label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }

        .login-footer {
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .ad-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
        }

        .ad-badge i {
            color: #4ade80;
        }

        .design-label {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            z-index: 100;
        }
        .design-label h3 { margin-bottom: 5px; color: #60a5fa; }
        .design-label p { font-size: 12px; opacity: 0.8; margin: 0; }
    </style>
</head>
<body>
    <div class="design-label">
        <h3>Option A: Glassmorphism</h3>
        <p>Modern, Trendy, Animierter Hintergrund</p>
    </div>

    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-container">
                    <img src="../../static/images/greiner-logo.svg" alt="Greiner Logo" onerror="this.src='../../static/images/greiner-logo.png'">
                </div>
                <h1 class="brand-name"><span>DRIVE</span></h1>
                <p class="brand-subtitle">Management System</p>
            </div>

            <div class="login-body">
                <div class="form-group">
                    <label class="form-label">Benutzername</label>
                    <div class="input-wrapper">
                        <i class="bi bi-person"></i>
                        <input type="text" class="form-control" placeholder="ihr.name@auto-greiner.de">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Passwort</label>
                    <div class="input-wrapper">
                        <i class="bi bi-lock"></i>
                        <input type="password" class="form-control" placeholder="••••••••">
                    </div>
                </div>

                <div class="form-options">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="remember">
                        <label for="remember">Angemeldet bleiben</label>
                    </div>
                </div>

                <button class="btn-login">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Anmelden
                </button>
            </div>

            <div class="login-footer">
                <div class="ad-badge">
                    <i class="bi bi-shield-check"></i>
                    Gesichert mit Active Directory
                </div>
            </div>
        </div>
    </div>
</body>
</html>
