<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Mockup C - Automotive Premium</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Dunkler Hintergrund mit Automotive-Feel */
            background: 
                linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.9)),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            background-color: #0f172a;
        }

        .login-wrapper {
            display: flex;
            max-width: 1000px;
            width: 95%;
            min-height: 600px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        /* Left Side - Visual */
        .visual-side {
            flex: 1.2;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 50px;
            overflow: hidden;
        }

        .visual-side::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,0,0,0.2) 0%, transparent 50%);
        }

        .car-silhouette {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 180px;
            color: rgba(255, 255, 255, 0.1);
            z-index: 0;
        }

        .visual-content {
            position: relative;
            z-index: 1;
            color: white;
        }

        .visual-content h2 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .visual-content p {
            font-size: 16px;
            opacity: 0.8;
            max-width: 300px;
        }

        .stats-row {
            display: flex;
            gap: 40px;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-item {
            text-align: left;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Right Side - Login */
        .login-side {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #0f172a;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-box {
            background: white;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            padding: 15px 25px;
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.3);
        }

        .logo-box img {
            height: 45px;
            width: auto;
        }

        .login-header h1 {
            color: white;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .login-header h1 span {
            color: #3b82f6;
        }

        .login-header p {
            color: #64748b;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
            font-size: 18px;
        }

        .form-control {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-control::placeholder {
            color: #475569;
        }

        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-wrapper input {
            width: 18px;
            height: 18px;
            accent-color: #3b82f6;
        }

        .checkbox-wrapper label {
            color: #64748b;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.4);
        }

        .login-footer {
            margin-top: 30px;
            text-align: center;
        }

        .ad-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 25px;
            color: #4ade80;
            font-size: 12px;
        }

        .design-label {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            z-index: 100;
            border: 1px solid #334155;
        }
        .design-label h3 { margin-bottom: 5px; color: #3b82f6; }
        .design-label p { font-size: 12px; opacity: 0.8; margin: 0; }

        @media (max-width: 800px) {
            .login-wrapper { flex-direction: column; }
            .visual-side { min-height: 250px; padding: 30px; }
            .car-silhouette { font-size: 100px; }
            .stats-row { display: none; }
        }
    </style>
</head>
<body>
    <div class="design-label">
        <h3>Option C: Automotive Premium</h3>
        <p>Dunkel, Edel, Auto-Silhouette, Statistiken</p>
    </div>

    <div class="login-wrapper">
        <!-- Left Side - Visual -->
        <div class="visual-side">
            <i class="bi bi-car-front-fill car-silhouette"></i>
            
            <div class="visual-content">
                <h2>Ihr Autohaus.<br>Digital gesteuert.</h2>
                <p>Alle Prozesse im Blick - von der Bestellung bis zur Auslieferung.</p>
                
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-value">85+</div>
                        <div class="stat-label">Mitarbeiter</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">4</div>
                        <div class="stat-label">Standorte</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">24/7</div>
                        <div class="stat-label">Verfügbar</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side - Login -->
        <div class="login-side">
            <div class="login-header">
                <div class="logo-box">
                    <img src="../../static/images/greiner-logo.svg" alt="Greiner Logo" onerror="this.src='../../static/images/greiner-logo.png'">
                </div>
                <h1><span>DRIVE</span></h1>
                <p>Management System</p>
            </div>

            <form>
                <div class="form-group">
                    <label class="form-label">Benutzername</label>
                    <div class="input-wrapper">
                        <i class="bi bi-person"></i>
                        <input type="text" class="form-control" placeholder="ihr.name@auto-greiner.de">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Passwort</label>
                    <div class="input-wrapper">
                        <i class="bi bi-lock"></i>
                        <input type="password" class="form-control" placeholder="••••••••">
                    </div>
                </div>

                <div class="form-options">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="remember">
                        <label for="remember">Angemeldet bleiben</label>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Anmelden
                </button>
            </form>

            <div class="login-footer">
                <div class="ad-badge">
                    <i class="bi bi-shield-check"></i>
                    Active Directory gesichert
                </div>
            </div>
        </div>
    </div>
</body>
</html>
