{% extends "base.html" %}
{% block title %}Hilfe – Admin – Greiner DRIVE{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/hilfe.css') }}?v={{ STATIC_VERSION }}">
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <h1 class="mb-4"><i class="bi bi-gear"></i> Hilfe – Verwaltung</h1>
    <p><a href="{{ url_for('hilfe.admin_neu') }}" class="btn btn-primary"><i class="bi bi-plus"></i> Neuer Artikel</a></p>
    <p><a href="{{ url_for('hilfe.uebersicht') }}" class="btn btn-outline-secondary"><i class="bi bi-question-circle"></i> Zur Hilfe-Übersicht</a></p>

    <h5 class="mt-4">Kategorien</h5>
    <div id="admin-kategorien" class="mb-4"><span class="text-muted">Wird geladen…</span></div>

    <h5 class="mt-4">Alle Artikel</h5>
    <div id="admin-artikel"><span class="text-muted">Wird geladen…</span></div>
</div>

<script>
(function() {
    function loadKategorien() {
        fetch('/api/hilfe/admin/kategorien', { credentials: 'same-origin' })
            .then(r => r.json())
            .then(data => {
                const el = document.getElementById('admin-kategorien');
                if (data.error) { el.innerHTML = '<span class="text-danger">' + data.error + '</span>'; return; }
                const kats = data.kategorien || [];
                el.innerHTML = kats.length ? '<ul class="list-group">' + kats.map(k =>
                    '<li class="list-group-item">' + k.name + ' <span class="badge bg-secondary">' + (k.artikel_anzahl || 0) + ' Artikel</span></li>'
                ).join('') + '</ul>' : '<p class="text-muted">Keine Kategorien.</p>';
            });
    }
    function loadArtikel() {
        fetch('/api/hilfe/admin/artikel', { credentials: 'same-origin' })
            .then(r => r.json())
            .then(data => {
                const el = document.getElementById('admin-artikel');
                if (data.error) { el.innerHTML = '<span class="text-danger">' + data.error + '</span>'; return; }
                const artikel = data.artikel || [];
                el.innerHTML = artikel.length ? '<ul class="list-group">' + artikel.map(a => {
                    const status = (a.freigabe_status || 'entwurf');
                    const isFreigegeben = status === 'freigegeben';
                    let badge = '<span class="badge bg-warning text-dark">Entwurf</span>';
                    if (isFreigegeben) badge = '<span class="badge bg-success">Freigegeben</span>';
                    let btns = '<span class="ms-2">' + badge + '</span>';
                    if (isFreigegeben) {
                        btns += ' <button type="button" class="btn btn-sm btn-outline-secondary ms-1" data-action="entwurf" data-id="' + a.id + '">Zurück Entwurf</button>';
                    } else {
                        btns += ' <button type="button" class="btn btn-sm btn-success ms-1" data-action="freigeben" data-id="' + a.id + '">Freigeben</button>';
                    }
                    btns += ' <a href="/hilfe/artikel/' + a.id + '" class="btn btn-sm btn-outline-primary ms-1" target="_blank">Ansehen</a>';
                    return '<li class="list-group-item d-flex flex-wrap align-items-center gap-1" data-artikel-id="' + a.id + '"><a href="/hilfe/admin/bearbeiten/' + a.id + '">' + a.titel + '</a> <span class="text-muted small">' + (a.kategorie_name || '') + '</span>' + btns + '</li>';
                }).join('') + '</ul>' : '<p class="text-muted">Keine Artikel.</p>';
                el.querySelectorAll('[data-action="freigeben"], [data-action="entwurf"]').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        const id = btn.getAttribute('data-id');
                        const action = btn.getAttribute('data-action');
                        const url = action === 'freigeben' ? '/api/hilfe/admin/artikel/' + id + '/freigeben' : '/api/hilfe/admin/artikel/' + id + '/entwurf';
                        fetch(url, { method: 'POST', credentials: 'same-origin' }).then(r => r.json()).then(function(data) {
                            if (data.error) alert(data.error); else loadArtikel();
                        }).catch(function() { alert('Fehler'); });
                    });
                });
            });
    }
    loadKategorien();
    loadArtikel();
})();
</script>
{% endblock %}
